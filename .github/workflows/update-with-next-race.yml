name: update-with-next-race

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  find-next-race:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Make scripts executable
        run: chmod +x *.sh

      - name: Run find_next_race.sh
        run: ./find_next_race.sh

      - name: Deploy output.json to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          include_only: output.json
          keep_files: true
