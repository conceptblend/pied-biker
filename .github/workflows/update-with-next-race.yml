name: update-with-next-race

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  find-next-race:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Make scripts executable
        run: chmod +x *.sh

      - name: Run find_next_race.sh
        run: ./find_next_race.sh

      - name: Stage output for deploy
        run: mkdir -p _deploy && cp output.json _deploy/output.json

      - name: Deploy output.json to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _deploy
          publish_branch: gh-pages
          keep_files: false
